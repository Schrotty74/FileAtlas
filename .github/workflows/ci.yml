name: CI

# Reiner Build-Check bei jedem Push/PR — erstellt kein Release, keine
# Artefakte. Getrennt von release.yml (das nur manuell per workflow_dispatch
# laeuft), damit sich beide nicht gegenseitig stoeren.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (Debug, unsigned)
        run: |
          xcodebuild \
            -project FileAtlas.xcodeproj \
            -scheme FileAtlas \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
