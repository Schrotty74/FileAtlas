name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project FileAtlas.xcodeproj \
            -scheme FileAtlas \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Find .app
        run: |
          APP=$(find build -name "*.app" -type d | head -1)
          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Create ZIP
        run: |
          ditto -c -k --keepParent "$APP_PATH" FileAtlas.zip

      - name: Create DMG
        run: |
          mkdir dmg_src
          cp -r "$APP_PATH" dmg_src/
          hdiutil create \
            -volname FileAtlas \
            -srcfolder dmg_src \
            -ov -format UDZO \
            FileAtlas.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            FileAtlas.dmg
            FileAtlas.zip
