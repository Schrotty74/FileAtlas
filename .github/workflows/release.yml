name: Release

# Manuell statt automatisch bei Tag-Push: build-release.sh ist der alleinige
# Release-Weg (siehe CLAUDE.md). Läuft dieser Workflow gleichzeitig bei einem
# Tag-Push, erzeugt/aktualisiert er dasselbe GitHub Release erneut mit
# generate_release_notes. Existiert bereits ein body (aus build-release.sh),
# hängt die GitHub-API die neu generierten Notes an den bestehenden Text an,
# statt ihn zu ersetzen — das verdoppelt den "Full Changelog"-Link (siehe
# Release v1.7.0). workflow_dispatch verhindert diese Race Condition.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (Release, stripped)
        run: |
          xcodebuild \
            -project FileAtlas.xcodeproj \
            -scheme FileAtlas \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            STRIP_INSTALLED_PRODUCT=YES \
            STRIP_SWIFT_SYMBOLS=YES \
            DEPLOYMENT_POSTPROCESSING=YES \
            DEBUG_INFORMATION_FORMAT=dwarf-with-dsym

      - name: Find .app
        run: |
          APP=$(find build/Build/Products/Release -name "*.app" -maxdepth 1 -type d | head -1)
          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Security check — no local paths or private data
        run: |
          echo "Checking for local user paths in binary..."
          BINARY="$APP_PATH/Contents/MacOS/FileAtlas"

          if strings "$BINARY" | grep -E "/Users/[a-zA-Z0-9_]+" | grep -v "/Users/runner"; then
            echo "ERROR: Local user paths found in binary!"
            exit 1
          fi

          echo "Checking for potential secrets..."
          if strings "$BINARY" | grep -iE "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}"; then
            echo "ERROR: Potential secrets found in binary!"
            exit 1
          fi

          echo "Checking that .dSYM is excluded from package..."
          if find "$APP_PATH" -name "*.dSYM" | grep -q .; then
            echo "ERROR: Debug symbols (.dSYM) found inside .app!"
            exit 1
          fi

          echo "Security check passed — no private data found."

      - name: Create ZIP
        run: |
          ditto -c -k --keepParent "$APP_PATH" FileAtlas.zip

      - name: Create DMG
        run: |
          mkdir dmg_src
          cp -r "$APP_PATH" dmg_src/
          hdiutil create \
            -volname FileAtlas \
            -srcfolder dmg_src \
            -ov -format UDZO \
            FileAtlas.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            FileAtlas.dmg
            FileAtlas.zip
